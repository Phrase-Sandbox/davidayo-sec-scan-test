rules:
  - id: python-sqli-fstring
    patterns:
      - pattern: $CUR.execute($Q)
      - metavariable-regex:
          metavariable: $Q
          # Match f-strings: starts with f" or f' and contains { (interpolation)
          regex: "^f[\"'].*\\{"
    message: >
      SQL query constructed with an f-string interpolating user-controlled input.
      Use parameterised queries: cursor.execute("... WHERE id = %s", (value,))
    languages: [python]
    severity: ERROR
    metadata:
      vuln_class: sqli
      owasp: A03:2021

  - id: python-sqli-string-format
    patterns:
      - pattern: $CUR.execute($Q)
      - metavariable-regex:
          metavariable: $Q
          # Match % formatting or + concatenation in the query argument
          regex: ".*(%\\s*\\w|\"\\s*\\+|'\\s*\\+)"
    message: >
      SQL query constructed by string formatting with user-controlled input.
      Use parameterised queries: cursor.execute("... WHERE id = %s", (value,))
    languages: [python]
    severity: ERROR
    metadata:
      vuln_class: sqli
      owasp: A03:2021

  - id: python-sqli-concat
    pattern: |
      $CURSOR.execute($QUERY + ...)
    message: >
      SQL query constructed by string concatenation. Use parameterised queries.
    languages: [python]
    severity: ERROR
    metadata:
      vuln_class: sqli
      owasp: A03:2021

  - id: python-sqli-percent-format-assign
    patterns:
      - pattern: |
          $Q = $SQL % $PARAMS
          ...
          $CUR.execute($Q)
      - metavariable-regex:
          metavariable: $SQL
          regex: "(?i).*(SELECT|INSERT|UPDATE|DELETE|FROM|WHERE|INTO).*"
    message: >
      SQL query built with % string formatting before execute(). Use parameterised
      queries: cursor.execute("... WHERE id = %s", (value,))
    languages: [python]
    severity: ERROR
    metadata:
      vuln_class: sqli
      owasp: A03:2021

  - id: python-sqli-format-method
    patterns:
      - pattern: $CUR.execute($Q.format(...))
    message: >
      SQL query constructed with .format() interpolation. Use parameterised queries.
    languages: [python]
    severity: ERROR
    metadata:
      vuln_class: sqli
      owasp: A03:2021

  - id: python-async-sqli-fstring
    patterns:
      - pattern: await $CUR.execute($Q)
      - metavariable-regex:
          metavariable: $Q
          regex: "^f[\"'].*\\{"
    message: >
      SQL query constructed with an f-string interpolating user-controlled input
      (async execute). Use parameterised queries: await cursor.execute("... WHERE id = %s", (value,))
    languages: [python]
    severity: ERROR
    metadata:
      vuln_class: sqli
      owasp: A03:2021

  - id: python-async-sqli-concat
    pattern: |
      await $CURSOR.execute($QUERY + ...)
    message: >
      SQL query constructed by string concatenation (async execute). Use parameterised queries.
    languages: [python]
    severity: ERROR
    metadata:
      vuln_class: sqli
      owasp: A03:2021

  - id: python-async-sqli-percent-format-assign
    mode: taint
    pattern-sources:
      - pattern: $TEMPLATE % $ARGS
    pattern-sinks:
      - patterns:
          - pattern: await $CUR.execute($QUERY)
          - pattern-not: await $CUR.execute($QUERY, $PARAMS)
    message: >
      SQL query built with Python % operator flows into await execute() without a
      params tuple (CWE-89, A03:2021). Taint tracking catches this even when the
      query is built before an async-with block. Use parameterised queries:
      await cursor.execute("... WHERE id = %s", (value,))
    languages: [python]
    severity: ERROR
    metadata:
      vuln_class: sqli
      owasp: A03:2021

  - id: python-async-sqli-format-method
    patterns:
      - pattern: await $CUR.execute($Q.format(...))
    message: >
      SQL query constructed with .format() interpolation (async execute). Use parameterised queries.
    languages: [python]
    severity: ERROR
    metadata:
      vuln_class: sqli
      owasp: A03:2021

  - id: python-jinja2-autoescape-false
    patterns:
      - pattern: $FUNC(..., autoescape=False, ...)
    message: >
      Jinja2 autoescaping disabled. All template variables will render raw HTML,
      enabling XSS. Set autoescape=True or use select_autoescape().
    languages: [python]
    severity: ERROR
    metadata:
      vuln_class: xss
      owasp: A03:2021

  - id: jinja2-safe-filter
    patterns:
      - pattern: "{{ $X | safe }}"
    message: >
      The | safe filter bypasses Jinja2 autoescaping. If $X contains
      user-controlled data this is stored XSS. Remove | safe or sanitize
      the value before rendering.
    languages: [generic]
    severity: ERROR
    metadata:
      vuln_class: xss
      owasp: A03:2021

  - id: python-eval-input
    pattern: eval($X)
    message: >
      eval() called with potentially untrusted input. This allows arbitrary
      code execution. Replace with a safe alternative.
    languages: [python]
    severity: ERROR
    metadata:
      vuln_class: code_injection
      owasp: A03:2021

  - id: python-os-system-input
    pattern-either:
      - pattern: os.system($X)
      - pattern: os.popen($X)
    message: >
      os.system/popen called with potentially untrusted input. Use
      subprocess with a list argument and shell=False instead.
    languages: [python]
    severity: ERROR
    metadata:
      vuln_class: command_injection
      owasp: A03:2021

  - id: python-pickle-loads
    pattern-either:
      - pattern: pickle.loads($X)
      - pattern: pickle.load($X)
      - pattern: cPickle.loads($X)
      - pattern: cPickle.load($X)
    message: >
      pickle.loads() deserializes arbitrary Python objects, allowing remote
      code execution if the input is attacker-controlled.
    languages: [python]
    severity: ERROR
    metadata:
      vuln_class: deserialization
      owasp: A08:2021

  - id: python-xml-parse-no-defusedxml
    pattern-either:
      - pattern: xml.etree.ElementTree.parse($X)
      - pattern: xml.etree.ElementTree.fromstring($X)
      - pattern: xml.etree.cElementTree.parse($X)
    message: >
      Standard XML parsing is vulnerable to XXE and billion-laughs attacks.
      Use defusedxml.ElementTree instead.
    languages: [python]
    severity: WARNING
    metadata:
      vuln_class: xxe
      owasp: A05:2021

  - id: python-exec-input
    pattern: exec($X)
    message: >
      exec() called with potentially untrusted input. This allows arbitrary
      code execution. Replace with a safe, scoped alternative.
    languages: [python]
    severity: ERROR
    metadata:
      vuln_class: code_injection
      owasp: A03:2021

  - id: python-marshal-loads
    pattern-either:
      - pattern: marshal.loads($X)
      - pattern: marshal.load($X)
    message: >
      marshal.loads() deserializes arbitrary Python objects and is not safe
      for untrusted data. Use a safer serialization format (e.g. JSON).
    languages: [python]
    severity: ERROR
    metadata:
      vuln_class: deserialization
      owasp: A08:2021

  - id: python-lxml-xxe
    pattern-either:
      - pattern: lxml.etree.parse($X)
      - pattern: lxml.etree.fromstring($X)
    message: >
      lxml parsing may be vulnerable to XXE if external entity resolution is
      enabled. Use lxml.etree.XMLParser(resolve_entities=False) and pass it
      to the parser call.
    languages: [python]
    severity: WARNING
    metadata:
      vuln_class: xxe
      owasp: A05:2021

  - id: python-open-redirect
    pattern-either:
      - pattern: flask.redirect($X)
      - pattern: redirect($X)
    message: >
      Open redirect: redirect() called with a potentially user-controlled URL.
      Validate the destination against an allowlist before redirecting.
    languages: [python]
    severity: WARNING
    metadata:
      vuln_class: open_redirect
      owasp: A01:2021

  - id: js-innerhtml-assignment
    pattern-either:
      - pattern: $X.innerHTML = $Y
      - pattern: $X.outerHTML = $Y
    message: >
      innerHTML/outerHTML assignment with potentially user-controlled data
      enables cross-site scripting (XSS). Use textContent or DOMPurify.sanitize().
    languages: [javascript, typescript]
    severity: ERROR
    metadata:
      vuln_class: xss
      owasp: A03:2021

  - id: js-document-write
    pattern-either:
      - pattern: document.write($X)
      - pattern: document.writeln($X)
    message: >
      document.write() with user-controlled data enables XSS. Use safe DOM
      APIs (createElement, textContent) instead.
    languages: [javascript, typescript]
    severity: ERROR
    metadata:
      vuln_class: xss
      owasp: A03:2021

  - id: js-eval-input
    pattern: eval($X)
    message: >
      eval() with potentially untrusted input allows arbitrary code execution.
      Replace with a safe, scoped alternative.
    languages: [javascript, typescript]
    severity: ERROR
    metadata:
      vuln_class: code_injection
      owasp: A03:2021

  - id: js-dangerously-set-innerhtml
    pattern: "dangerouslySetInnerHTML={{ __html: $X }}"
    message: >
      dangerouslySetInnerHTML with user-controlled data enables XSS in React.
      Sanitize the content with DOMPurify before passing it here.
    languages: [generic]
    severity: ERROR
    metadata:
      vuln_class: xss
      owasp: A03:2021

  - id: js-child-process-exec-concat
    pattern-either:
      - pattern: require('child_process').exec($X + ...)
      - pattern: require("child_process").exec($X + ...)
      - pattern: exec($CMD + ...)
    message: >
      child_process.exec() with string concatenation allows command injection.
      Use execFile() or spawn() with an array argument instead.
    languages: [javascript, typescript]
    severity: ERROR
    metadata:
      vuln_class: command_injection
      owasp: A03:2021
