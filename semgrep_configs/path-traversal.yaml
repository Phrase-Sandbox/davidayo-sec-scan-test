rules:

  # ---------------------------------------------------------------------------
  # Python path traversal
  # ---------------------------------------------------------------------------

  - id: python-open-path-traversal
    patterns:
      - pattern: open($PATH, ...)
      - pattern-not: open("...", ...)
    message: >
      open() called with a potentially user-controlled path (CWE-22 Path Traversal).
      An attacker can supply '../../../etc/passwd' to read arbitrary files on the
      server. Use os.path.realpath() + os.path.commonpath() to ensure the resolved
      path stays within an intended directory, or use an allowlist of permitted filenames.
    languages: [python]
    severity: WARNING
    metadata:
      vuln_class: path_traversal
      owasp: A01:2021
      cwe: CWE-22

  - id: python-open-concat-traversal
    patterns:
      - pattern: open($BASE + $USER_INPUT, ...)
    message: >
      open() called with a path constructed by string concatenation.
      Path traversal allows reading or writing files outside the intended directory.
      Use os.path.realpath() and os.path.commonpath() to validate the resulting path.
    languages: [python]
    severity: ERROR
    metadata:
      vuln_class: path_traversal
      owasp: A01:2021
      cwe: CWE-22

  - id: python-open-fstring-traversal
    patterns:
      - pattern: open(f"...{$VAR}...", ...)
    message: >
      open() called with an f-string path containing a variable.
      If $VAR contains user input, path traversal may allow reading arbitrary files.
      Validate and normalize the path before opening.
    languages: [python]
    severity: WARNING
    metadata:
      vuln_class: path_traversal
      owasp: A01:2021
      cwe: CWE-22

  - id: python-pathlib-traversal
    patterns:
      - pattern: pathlib.Path($PATH)
      - pattern-not: pathlib.Path("...")
    message: >
      pathlib.Path() constructed with a potentially user-controlled value.
      An attacker can include '..' components to escape the intended directory.
      Resolve the path with .resolve() and check with .is_relative_to(base_dir).
    languages: [python]
    severity: WARNING
    metadata:
      vuln_class: path_traversal
      owasp: A01:2021
      cwe: CWE-22

  - id: python-send-file-traversal
    patterns:
      - pattern: flask.send_file($PATH, ...)
      - pattern-not: flask.send_file("...", ...)
    message: >
      flask.send_file() with a potentially user-controlled path enables path
      traversal. Use flask.send_from_directory() to restrict file serving to a
      safe directory, or validate the path with os.path.commonpath().
    languages: [python]
    severity: ERROR
    metadata:
      vuln_class: path_traversal
      owasp: A01:2021
      cwe: CWE-22

  - id: python-send-from-directory-traversal
    patterns:
      - pattern: flask.send_from_directory($DIR, $FILENAME, ...)
      - pattern-not: flask.send_from_directory($DIR, "...", ...)
    message: >
      flask.send_from_directory() with a potentially user-controlled filename.
      Flask sanitizes the filename by default with werkzeug.utils.safe_join, but
      verify the filename is not user-supplied without sanitization.
    languages: [python]
    severity: WARNING
    metadata:
      vuln_class: path_traversal
      owasp: A01:2021
      cwe: CWE-22

  - id: python-os-listdir-traversal
    patterns:
      - pattern: os.listdir($PATH)
      - pattern-not: os.listdir("...")
    message: >
      os.listdir() with a potentially user-controlled path enables directory
      traversal, allowing an attacker to enumerate server directory contents.
      Validate and normalize the path before listing.
    languages: [python]
    severity: WARNING
    metadata:
      vuln_class: path_traversal
      owasp: A01:2021
      cwe: CWE-22

  - id: python-shutil-copy-traversal
    patterns:
      - pattern: shutil.copy($SRC, $DST)
      - pattern-not: shutil.copy("...", "...")
    message: >
      shutil.copy() with potentially user-controlled paths enables path traversal,
      allowing an attacker to read or overwrite arbitrary files.
      Validate source and destination paths with os.path.realpath() + commonpath().
    languages: [python]
    severity: WARNING
    metadata:
      vuln_class: path_traversal
      owasp: A01:2021
      cwe: CWE-22

  - id: python-os-path-join-user-input
    patterns:
      - pattern: os.path.join($BASE, request.$ATTR)
    message: >
      os.path.join() with request data as the filename enables path traversal.
      The attacker can supply '../../../etc/passwd' to escape the base directory.
      Use werkzeug.utils.safe_join() or validate with os.path.commonpath().
    languages: [python]
    severity: ERROR
    metadata:
      vuln_class: path_traversal
      owasp: A01:2021
      cwe: CWE-22

  # ---------------------------------------------------------------------------
  # JavaScript / TypeScript path traversal
  # ---------------------------------------------------------------------------

  - id: js-fs-readfile-traversal
    patterns:
      - pattern: fs.readFile($PATH, ...)
      - pattern-not: fs.readFile("...", ...)
    message: >
      fs.readFile() with a potentially user-controlled path enables path traversal
      (CWE-22). An attacker can supply '../../../etc/passwd' to read arbitrary files.
      Use path.resolve() and verify the result is within the intended directory
      with startsWith(allowedBase).
    languages: [javascript, typescript]
    severity: WARNING
    metadata:
      vuln_class: path_traversal
      owasp: A01:2021
      cwe: CWE-22

  - id: js-fs-readfilesync-traversal
    patterns:
      - pattern: fs.readFileSync($PATH, ...)
      - pattern-not: fs.readFileSync("...", ...)
    message: >
      fs.readFileSync() with a potentially user-controlled path enables path
      traversal. Validate the resolved path against an allowed base directory.
    languages: [javascript, typescript]
    severity: WARNING
    metadata:
      vuln_class: path_traversal
      owasp: A01:2021
      cwe: CWE-22

  - id: js-fs-writefile-traversal
    patterns:
      - pattern: fs.writeFile($PATH, ...)
      - pattern-not: fs.writeFile("...", ...)
    message: >
      fs.writeFile() with a potentially user-controlled path enables path
      traversal for arbitrary file write (CWE-22). Validate the path before writing.
    languages: [javascript, typescript]
    severity: ERROR
    metadata:
      vuln_class: path_traversal
      owasp: A01:2021
      cwe: CWE-22

  - id: js-fs-createreadstream-traversal
    patterns:
      - pattern: fs.createReadStream($PATH, ...)
      - pattern-not: fs.createReadStream("...", ...)
    message: >
      fs.createReadStream() with a potentially user-controlled path enables
      arbitrary file read. Validate the resolved path before streaming.
    languages: [javascript, typescript]
    severity: WARNING
    metadata:
      vuln_class: path_traversal
      owasp: A01:2021
      cwe: CWE-22

  - id: js-path-join-traversal
    patterns:
      - pattern: path.join($BASE, $REQ)
      - pattern-not: path.join($BASE, "...")
    message: >
      path.join() with a potentially user-controlled component enables path
      traversal. An attacker can supply '..' segments to escape the base directory.
      Use path.resolve() and verify the result starts with the allowed base path.
    languages: [javascript, typescript]
    severity: WARNING
    metadata:
      vuln_class: path_traversal
      owasp: A01:2021
      cwe: CWE-22

  - id: js-express-res-download-traversal
    patterns:
      - pattern: $RES.download($PATH, ...)
      - pattern-not: $RES.download("...", ...)
    message: >
      res.download() with a potentially user-controlled path enables path traversal.
      Use res.download() with path.resolve() validation or serve from a static dir.
    languages: [javascript, typescript]
    severity: WARNING
    metadata:
      vuln_class: path_traversal
      owasp: A01:2021
      cwe: CWE-22

  - id: js-express-res-sendfile-traversal
    patterns:
      - pattern: $RES.sendFile($PATH, ...)
      - pattern-not: $RES.sendFile("...", ...)
    message: >
      res.sendFile() with a potentially user-controlled path enables path traversal.
      Always pass an absolute path built from a trusted base directory, validated
      with path.resolve() + startsWith(allowedBase).
    languages: [javascript, typescript]
    severity: ERROR
    metadata:
      vuln_class: path_traversal
      owasp: A01:2021
      cwe: CWE-22

  # ---------------------------------------------------------------------------
  # Ruby path traversal
  # ---------------------------------------------------------------------------

  - id: ruby-file-read-traversal
    patterns:
      - pattern: File.read($PATH)
      - pattern-not: File.read("...")
    message: >
      File.read() with a potentially user-controlled path enables path traversal.
      Validate the path using File.expand_path and ensure it starts with the
      allowed base directory.
    languages: [ruby]
    severity: WARNING
    metadata:
      vuln_class: path_traversal
      owasp: A01:2021
      cwe: CWE-22

  - id: ruby-file-open-traversal
    patterns:
      - pattern: File.open($PATH)
      - pattern-not: File.open("...")
    message: >
      File.open() with a potentially user-controlled path enables path traversal.
      Validate and normalize the path before opening.
    languages: [ruby]
    severity: WARNING
    metadata:
      vuln_class: path_traversal
      owasp: A01:2021
      cwe: CWE-22
