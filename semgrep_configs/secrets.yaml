rules:

  # ---------------------------------------------------------------------------
  # Hardcoded credentials / secrets — Python
  # ---------------------------------------------------------------------------

  - id: python-hardcoded-password-kwarg
    patterns:
      - pattern: $FUNC(..., password="...", ...)
      - pattern-not: $FUNC(..., password="", ...)
    message: >
      Hardcoded password passed as keyword argument (CWE-798).
      Store credentials in environment variables or a secrets manager.
    languages: [python]
    severity: ERROR
    metadata:
      vuln_class: hardcoded_secret
      owasp: A07:2021
      cwe: CWE-798

  - id: python-hardcoded-secret-assign
    patterns:
      - pattern: $VAR = "..."
      - metavariable-regex:
          metavariable: $VAR
          regex: (?i)(password|passwd|secret|api_key|apikey|access_key|auth_token|private_key|secret_key|signing_key|jwt_secret|db_pass|db_password)
      - pattern-not: $VAR = ""
    message: >
      Hardcoded secret assigned to variable '$VAR' (CWE-798).
      Use environment variables (os.environ) or a secrets manager instead.
    languages: [python]
    severity: ERROR
    metadata:
      vuln_class: hardcoded_secret
      owasp: A07:2021
      cwe: CWE-798

  - id: python-flask-hardcoded-secret-key
    patterns:
      - pattern: app.secret_key = "..."
      - pattern-not: app.secret_key = ""
    message: >
      Flask app.secret_key is hardcoded (CWE-798). If this value is in version
      control, an attacker can forge session cookies. Load it from an environment
      variable: app.secret_key = os.environ["SECRET_KEY"]
    languages: [python]
    severity: ERROR
    metadata:
      vuln_class: hardcoded_secret
      owasp: A07:2021
      cwe: CWE-798

  - id: python-django-hardcoded-secret-key
    patterns:
      - pattern: SECRET_KEY = "..."
      - pattern-not: SECRET_KEY = ""
    message: >
      Django SECRET_KEY is hardcoded (CWE-798). Move it to an environment variable:
      SECRET_KEY = os.environ["DJANGO_SECRET_KEY"]
    languages: [python]
    severity: ERROR
    metadata:
      vuln_class: hardcoded_secret
      owasp: A07:2021
      cwe: CWE-798

  - id: python-hardcoded-jwt-secret
    patterns:
      - pattern: jwt.encode($PAYLOAD, "...", ...)
      - pattern-not: jwt.encode($PAYLOAD, "", ...)
    message: >
      JWT token signed with a hardcoded secret (CWE-798). An attacker with access
      to the source can forge any token. Load the signing key from environment
      variables or a key management service.
    languages: [python]
    severity: ERROR
    metadata:
      vuln_class: hardcoded_secret
      owasp: A07:2021
      cwe: CWE-798

  - id: python-hardcoded-db-url
    patterns:
      - pattern: $VAR = "postgresql://..."
      - pattern-not: $VAR = ""
    message: >
      Hardcoded database connection URL with embedded credentials (CWE-798).
      Use DATABASE_URL environment variable instead.
    languages: [python]
    severity: ERROR
    metadata:
      vuln_class: hardcoded_secret
      owasp: A07:2021
      cwe: CWE-798

  # ---------------------------------------------------------------------------
  # Hardcoded credentials — JavaScript / TypeScript
  # ---------------------------------------------------------------------------

  - id: js-hardcoded-secret-assign
    patterns:
      - pattern: const $VAR = "..."
      - metavariable-regex:
          metavariable: $VAR
          regex: (?i)(password|passwd|secret|api_key|apikey|access_key|auth_token|private_key|secret_key|signing_key|jwt_secret|db_pass)
      - pattern-not: const $VAR = ""
    message: >
      Hardcoded secret assigned to '$VAR' (CWE-798).
      Use environment variables (process.env) or a secrets manager.
    languages: [javascript, typescript]
    severity: ERROR
    metadata:
      vuln_class: hardcoded_secret
      owasp: A07:2021
      cwe: CWE-798

  - id: js-hardcoded-jwt-sign
    patterns:
      - pattern: jwt.sign($PAYLOAD, "...", ...)
      - pattern-not: jwt.sign($PAYLOAD, "", ...)
    message: >
      JWT token signed with a hardcoded secret (CWE-798). Load the signing key
      from process.env or a key management service.
    languages: [javascript, typescript]
    severity: ERROR
    metadata:
      vuln_class: hardcoded_secret
      owasp: A07:2021
      cwe: CWE-798

  - id: js-hardcoded-aws-key
    patterns:
      - pattern: accessKeyId = "AKIA..."
    message: >
      Hardcoded AWS Access Key ID found (CWE-798). Rotate this key immediately
      and load credentials via IAM roles, instance profiles, or environment variables.
    languages: [javascript, typescript]
    severity: ERROR
    metadata:
      vuln_class: hardcoded_secret
      owasp: A07:2021
      cwe: CWE-798

  # ---------------------------------------------------------------------------
  # Hardcoded credentials — Java
  # ---------------------------------------------------------------------------

  - id: java-hardcoded-password-field
    patterns:
      - pattern: $VAR = "..."
      - metavariable-regex:
          metavariable: $VAR
          regex: (?i)(password|passwd|secret|apiKey|api_key|accessKey|access_key|authToken|secretKey|jwtSecret|dbPass|dbPassword)
      - pattern-not: $VAR = ""
    message: >
      Hardcoded secret in variable '$VAR' (CWE-798).
      Load from environment variables or a secrets manager (AWS Secrets Manager,
      Vault, etc.).
    languages: [java]
    severity: ERROR
    metadata:
      vuln_class: hardcoded_secret
      owasp: A07:2021
      cwe: CWE-798

  - id: java-hardcoded-connection-string
    patterns:
      - pattern: DriverManager.getConnection("...", "...", "...")
    message: >
      Hardcoded database credentials in DriverManager.getConnection() (CWE-798).
      Use environment variables or a connection pool configured via external config.
    languages: [java]
    severity: ERROR
    metadata:
      vuln_class: hardcoded_secret
      owasp: A07:2021
      cwe: CWE-798

  - id: java-hardcoded-basic-auth
    patterns:
      - pattern: $REQ.addRequestProperty("Authorization", "Basic ...")
    message: >
      Hardcoded Basic auth credentials in HTTP request header (CWE-798).
      Encode credentials from environment variables at runtime.
    languages: [java]
    severity: ERROR
    metadata:
      vuln_class: hardcoded_secret
      owasp: A07:2021
      cwe: CWE-798

  # ---------------------------------------------------------------------------
  # Hardcoded credentials — Ruby
  # ---------------------------------------------------------------------------

  - id: ruby-hardcoded-secret-assign
    patterns:
      - pattern: $VAR = "..."
      - metavariable-regex:
          metavariable: $VAR
          regex: (?i)(password|passwd|secret|api_key|apikey|access_key|auth_token|secret_key|jwt_secret)
      - pattern-not: $VAR = ""
    message: >
      Hardcoded secret in '$VAR' (CWE-798). Use ENV[] or Rails credentials.
    languages: [ruby]
    severity: ERROR
    metadata:
      vuln_class: hardcoded_secret
      owasp: A07:2021
      cwe: CWE-798

  - id: ruby-hardcoded-secret-key-base
    patterns:
      - pattern: config.secret_key_base = "..."
      - pattern-not: config.secret_key_base = ""
    message: >
      Rails secret_key_base is hardcoded (CWE-798). Move it to Rails credentials
      (config/credentials.yml.enc) or use ENV["SECRET_KEY_BASE"].
    languages: [ruby]
    severity: ERROR
    metadata:
      vuln_class: hardcoded_secret
      owasp: A07:2021
      cwe: CWE-798

  # ---------------------------------------------------------------------------
  # Hardcoded credentials — Go
  # ---------------------------------------------------------------------------

  - id: go-hardcoded-secret-assign
    patterns:
      - pattern: $VAR := "..."
      - metavariable-regex:
          metavariable: $VAR
          regex: (?i)(password|passwd|secret|apiKey|api_key|accessKey|access_key|authToken|secretKey|jwtSecret|dbPass)
      - pattern-not: $VAR := ""
    message: >
      Hardcoded secret in variable '$VAR' (CWE-798). Load from os.Getenv() or
      a secrets manager.
    languages: [go]
    severity: ERROR
    metadata:
      vuln_class: hardcoded_secret
      owasp: A07:2021
      cwe: CWE-798

  - id: go-hardcoded-db-dsn
    patterns:
      - pattern: sql.Open($DRIVER, $DSN)
      - metavariable-regex:
          metavariable: $DSN
          regex: '"[^"]*:[^"]*@[^"]*"'
    message: >
      Hardcoded database DSN with embedded credentials (CWE-798).
      Build the DSN from environment variables at runtime.
    languages: [go]
    severity: ERROR
    metadata:
      vuln_class: hardcoded_secret
      owasp: A07:2021
      cwe: CWE-798

