# Centrally-hosted PR-rejection watcher (Appendix D-16 — DEVIATION,
# pending Security/Legal sign-off).
#
# Consumers reference this with `uses:` on their own `pull_request: [closed]`
# trigger — exactly like they already reference the gate. When the BOT's
# auto-fix PR (head `security/issues/*`) is closed WITHOUT being merged, this
# gathers who closed it, when, and why (the closer's closing comment), reads
# the severity from the D-14 audit trail on the bot branch, and POSTs to the
# scanner's /agent/pr-event. The scanner ALWAYS audit-logs the rejection and
# sends the #security Slack alert ONLY for High/Critical findings (the one
# Slack webhook lives only on the service). Notify failure never fails the
# developer's repo (best-effort, fail-open).
name: Security PR-rejection watcher (reusable)

on:
  workflow_call:
    inputs:
      runner:
        description: Runner label. Default = Phrase Launchpad self-hosted (spec-exact).
        type: string
        default: core-arc-ondemand-launchpad
      scanner_url:
        description: Base URL of the hosted scanner service.
        type: string
        required: true
    secrets:
      PHRASE_SCAN_TOKEN:
        required: true

jobs:
  pr-rejection:
    runs-on: ${{ inputs.runner }}
    # Only a CLOSED-UNMERGED bot auto-fix PR is a "rejection".
    if: >-
      ${{ github.event.pull_request.merged == false &&
          startsWith(github.event.pull_request.head.ref, 'security/issues/') }}
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Notify scanner of the rejected auto-fix PR
        env:
          GH_TOKEN: ${{ github.token }}
          SCANNER_URL: ${{ inputs.scanner_url }}
          PHRASE_SCAN_TOKEN: ${{ secrets.PHRASE_SCAN_TOKEN }}
          REPO: ${{ github.repository }}
          REPO_URL: ${{ github.server_url }}/${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
          CLOSED_AT: ${{ github.event.pull_request.closed_at }}
          CLOSED_BY: ${{ github.event.sender.login }}
        shell: bash
        run: |
          set -euo pipefail

          # why: the closer's most recent comment on this PR (empty if none)
          REASON="$(gh api "repos/${REPO}/issues/${PR_NUMBER}/comments" \
              --jq "[.[] | select(.user.login==\"${CLOSED_BY}\") | .body] | last // \"\"" \
              2>/dev/null || true)"
          export REASON

          # severity from the latest D-14 audit report on the bot branch.
          # Conservative default 0C/1H: a security/issues PR exists ONLY for a
          # blocked (High/Critical) scan, so a real rejection must still alert
          # even if the trail is unreadable.
          CRIT=0; HIGH=1
          names="$(gh api "repos/${REPO}/contents/security_findings?ref=${HEAD_REF}" --jq '.[].name' 2>/dev/null || true)"
          latest="$(printf '%s\n' "$names" | sed -n 's/^security-scan-report\.\([0-9][0-9]*\)\.json$/\1/p' | sort -n | tail -1)"
          if [ -n "${latest:-}" ] && gh api "repos/${REPO}/contents/security_findings/security-scan-report.${latest}.json?ref=${HEAD_REF}" --jq '.content' 2>/dev/null | base64 -d > "$RUNNER_TEMP/rep.json" 2>/dev/null; then
            CRIT="$(python3 -c "import json,sys;d=json.load(open(sys.argv[1]));print(sum(1 for x in d.get('findings',[]) if x.get('severity')=='Critical'))" "$RUNNER_TEMP/rep.json" 2>/dev/null || echo 0)"
            HIGH="$(python3 -c "import json,sys;d=json.load(open(sys.argv[1]));print(sum(1 for x in d.get('findings',[]) if x.get('severity')=='High'))" "$RUNNER_TEMP/rep.json" 2>/dev/null || echo 1)"
          fi
          export CRIT HIGH

          # mandatory reason: if none, demand one on the PR (best-effort) — the
          # scanner alert will also flag REASON MISSING.
          if [ -z "${REASON}" ]; then
            gh pr comment "${PR_NUMBER}" -R "${REPO}" --body "⚠️ This security auto-fix PR was closed without merging and **without a reason**. A rejection reason is *mandatory* — please reply stating why these fixes were rejected. (Security has been alerted.)" >/dev/null 2>&1 || true
          fi

          # build payload; the scanner audit-logs always, Slack only High/Critical
          python3 -c '
          import json, os
          print(json.dumps({
            "repo_url": os.environ["REPO_URL"],
            "pr_number": int(os.environ["PR_NUMBER"]),
            "pr_url": os.environ["PR_URL"],
            "head_ref": os.environ["HEAD_REF"],
            "merged": False,
            "closed_by": os.environ.get("CLOSED_BY") or "unknown",
            "closed_at": os.environ.get("CLOSED_AT") or "",
            "reason": (os.environ.get("REASON") or None),
            "critical": int(os.environ.get("CRIT") or 0),
            "high": int(os.environ.get("HIGH") or 0),
          }))' > "$RUNNER_TEMP/pr_event.json"

          code="$(curl -sS -o "$RUNNER_TEMP/resp.json" -w '%{http_code}' --max-time 30 \
            -X POST "${SCANNER_URL%/}/agent/pr-event" \
            -H "Authorization: Bearer ${PHRASE_SCAN_TOKEN}" \
            -H "Content-Type: application/json" \
            -H "ngrok-skip-browser-warning: true" \
            --data @"$RUNNER_TEMP/pr_event.json" || echo 000)"
          echo "pr-event POST -> HTTP ${code}"
          cat "$RUNNER_TEMP/resp.json" 2>/dev/null || true
          # Best-effort: a notify failure must never fail the developer's repo.
          exit 0
