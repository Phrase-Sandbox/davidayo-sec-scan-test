# Build the phrase-sec-scan CLI binary for Linux / macOS / Windows and
# attach each artifact to the GitHub Release matching the pushed tag.
# Triggered by `v*` tag pushes; can also be run manually via workflow_dispatch.
name: release-cli

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write  # required for `gh release upload`

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x86_64
            ext: ""
          - os: macos-13
            target: darwin-x86_64
            ext: ""
          - os: macos-14
            target: darwin-arm64
            ext: ""
          - os: windows-latest
            target: windows-x86_64
            ext: ".exe"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build binary (Unix)
        if: runner.os != 'Windows'
        run: ./build.sh

      - name: Build binary (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: PYTHON=python ./build.sh

      - name: Rename artifact
        shell: bash
        run: |
          mv "dist/phrase-sec-scan${{ matrix.ext }}" \
             "dist/phrase-sec-scan-${{ matrix.target }}${{ matrix.ext }}"

      - name: Upload as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: phrase-sec-scan-${{ matrix.target }}
          path: dist/phrase-sec-scan-${{ matrix.target }}${{ matrix.ext }}

      - name: Attach to release (tag pushes only)
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          gh release upload "${GITHUB_REF_NAME}" \
            "dist/phrase-sec-scan-${{ matrix.target }}${{ matrix.ext }}" \
            --clobber
