# ⚠️ SIMULATION-ONLY — not for the Phrase platform.
#
# The platform CI is `ci.yml`, which (per CLAUDE.md) MUST run on the
# Launchpad self-hosted runner `core-arc-ondemand-launchpad`. That runner
# does not exist on a personal GitHub account, so `ci.yml` sits "Queued"
# forever here. This file runs the IDENTICAL test/lint steps on a
# GitHub-hosted runner so the simulation repo gets real green checks.
#
# Do NOT use this file (or `ubuntu-latest`) for the real Phrase deployment —
# `ci.yml` remains the source of truth there and is intentionally unchanged.
name: CI (simulation)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint with ruff
        run: ruff check src tests

      - name: Run tests with coverage
        # Coverage gate (>=80%) is configured in pyproject.toml addopts.
        run: pytest
