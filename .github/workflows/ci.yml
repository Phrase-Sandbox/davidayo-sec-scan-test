name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    # Self-hosted runner from .phrase-platform/phrase-launchpad.yaml (github.runner).
    # Do NOT switch to ubuntu-latest — it cannot reach internal services (ECR, EKS).
    runs-on: core-arc-ondemand-launchpad
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint with ruff
        run: ruff check src tests

      - name: Run tests with coverage
        # Coverage gate (≥80%) is configured in pyproject.toml addopts.
        run: pytest
