# Local-development docker-compose file.
#
# Two services:
# - security-scanner       — default, production-like (port 8000)
# - security-scanner-test  — LOCAL_TEST_MODE=true, mounts /agent/test-scan
#                            (port 8001, profile=test, opt-in only)
#
# Usage:
#   cp .env.local.example .env.local         # one-time
#   docker compose --env-file .env.local up --build                            # prod-like
#   docker compose --profile test --env-file .env.local up security-scanner-test --build  # test
#
# `read_only: true` + tmpfs /tmp matches the production Kubernetes pod's
# securityContext, so any place the service tries to write to the filesystem
# fails locally too (and we catch it before deploy).

services:
  # Postgres backs the per-user LOCAL_SCAN_TOKEN registry and the audit log
  # the admin UI reads. Stays inside the compose network; no host port needed
  # for normal use (uncomment the ports: line if you want to psql from the host).
  postgres:
    image: postgres:15-alpine
    container_name: phrase-security-scanner-postgres
    environment:
      POSTGRES_USER: scanner
      POSTGRES_PASSWORD: scanner
      POSTGRES_DB: scanner
    volumes:
      - postgres-data:/var/lib/postgresql/data
    # ports:
    #   - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scanner -d scanner"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  security-scanner:
    build: .
    image: phrase-security-scanner:local
    container_name: phrase-security-scanner
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-test-key-placeholder}
      - CLAUDE_MODEL=${CLAUDE_MODEL:-claude-sonnet-4-6}
      - CLAUDE_TIMEOUT_SECONDS=${CLAUDE_TIMEOUT_SECONDS:-180}
      # Provider switch: default anthropic; set to "google" to use Gemini server-side.
      - SCANNER_LLM_PROVIDER=${SCANNER_LLM_PROVIDER:-anthropic}
      - SCANNER_LLM_MODEL=${SCANNER_LLM_MODEL:-}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - GITHUB_APP_ID=${GITHUB_APP_ID:-12345}
      - GITHUB_APP_PRIVATE_KEY=${GITHUB_APP_PRIVATE_KEY:-placeholder}
      - GITHUB_OAUTH_CLIENT_ID=${GITHUB_OAUTH_CLIENT_ID:-placeholder}
      - GITHUB_OAUTH_CLIENT_SECRET=${GITHUB_OAUTH_CLIENT_SECRET:-placeholder}
      - PHRASE_SCAN_TOKEN=${PHRASE_SCAN_TOKEN:-local-test-token}
      - LOCAL_SCAN_TOKEN=${LOCAL_SCAN_TOKEN:-}
      - LOG_LEVEL=DEBUG
      - DATABASE_URL=${DATABASE_URL:-postgresql+psycopg://scanner:scanner@postgres:5432/scanner}
      - ADMIN_GROUP_NAME=${ADMIN_GROUP_NAME:-security-scanner-admins}
      - ADMIN_LOCAL_BYPASS=${ADMIN_LOCAL_BYPASS:-true}
      - USE_TOKEN_REGISTRY=${USE_TOKEN_REGISTRY:-true}
      - RUN_MIGRATIONS_ON_STARTUP=${RUN_MIGRATIONS_ON_STARTUP:-true}
      # Fernet key for encrypting API keys at rest (user + org settings).
      # Generate with: python -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())"
      - SCANNER_ENCRYPTION_KEY=${SCANNER_ENCRYPTION_KEY}
      # v1 multi-scanner + v2/v3 context packager + verifier
      - ENABLE_MULTI_SCANNER=${ENABLE_MULTI_SCANNER:-true}
      - SCANNER_CONCURRENCY=${SCANNER_CONCURRENCY:-4}
      - SCANNER_TIMEOUT_SECONDS=${SCANNER_TIMEOUT_SECONDS:-60}
      - VULN_VERIFIER_PARALLELISM=${VULN_VERIFIER_PARALLELISM:-2}
      - CLAUDE_CHUNK_SIZE=${CLAUDE_CHUNK_SIZE:-48}
      # Gemini-specific tuning. Explicit defaults so we don't accidentally
      # inherit CLAUDE_CHUNK_SIZE (which is set lower for the Cloudflare
      # tunnel timeout but suboptimal for Gemini's 1M context window).
      - GEMINI_CHUNK_SIZE=${GEMINI_CHUNK_SIZE:-24}
      - GEMINI_MAX_TOKENS=${GEMINI_MAX_TOKENS:-16384}
      - VULN_VERIFIER_KEEP_CONFIDENCES=${VULN_VERIFIER_KEEP_CONFIDENCES:-high}
      - ADVISORY_CONFIDENCES=${ADVISORY_CONFIDENCES:-medium,low}
      # Semgrep writes settings/log/version-cache on startup; redirect all to /tmp so read_only: true doesn't block it
      - SEMGREP_SETTINGS_FILE=/tmp/semgrep-settings.yml
      - SEMGREP_LOG_FILE=/tmp/semgrep.log
      - SEMGREP_VERSION_CACHE_PATH=/tmp/semgrep-version-cache
      - XDG_CACHE_HOME=/tmp/xdg-cache
    read_only: true
    tmpfs:
      - /tmp
    user: "1000:1000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/healthz"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

  # Opt-in test service: ``docker compose --profile test up security-scanner-test``.
  # Mounts /agent/test-scan, which bypasses GitHub fetching with caller-
  # supplied files. NEVER enable this profile in production deploys.
  security-scanner-test:
    extends:
      service: security-scanner
    container_name: phrase-security-scanner-test
    ports:
      - "8001:8000"
    environment:
      - PORT=8000
      - LOCAL_TEST_MODE=true
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-test-key-placeholder}
      - GITHUB_APP_ID=placeholder
      - GITHUB_APP_PRIVATE_KEY=placeholder
      - GITHUB_OAUTH_CLIENT_ID=placeholder
      - GITHUB_OAUTH_CLIENT_SECRET=placeholder
      - PHRASE_SCAN_TOKEN=${PHRASE_SCAN_TOKEN:-local-test-token}
      - LOCAL_SCAN_TOKEN=${LOCAL_SCAN_TOKEN:-}
      - LOG_LEVEL=DEBUG
      - DATABASE_URL=${DATABASE_URL:-postgresql+psycopg://scanner:scanner@postgres:5432/scanner}
      - ADMIN_GROUP_NAME=${ADMIN_GROUP_NAME:-security-scanner-admins}
      - ADMIN_LOCAL_BYPASS=${ADMIN_LOCAL_BYPASS:-true}
      - USE_TOKEN_REGISTRY=${USE_TOKEN_REGISTRY:-true}
      - RUN_MIGRATIONS_ON_STARTUP=${RUN_MIGRATIONS_ON_STARTUP:-true}
      - SCANNER_ENCRYPTION_KEY=${SCANNER_ENCRYPTION_KEY}
    profiles:
      - test

volumes:
  postgres-data:
