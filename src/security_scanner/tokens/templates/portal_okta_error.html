{% extends "base.html" %}
{% block title %}Login Error — Phrase Security Scanner{% endblock %}
{% block content %}
<div style="max-width: 420px; margin: 0 auto;">
  <div class="card">
    <h2>Login Error</h2>
    <div class="flash flash-err" style="margin-bottom: 1rem;">{{ error }}</div>
    <p class="muted">If this problem persists, please contact your administrator.</p>
    <a href="/portal/login" class="btn btn-primary" style="margin-top: 0.5rem;">Try again</a>
  </div>
</div>
{% endblock %}
