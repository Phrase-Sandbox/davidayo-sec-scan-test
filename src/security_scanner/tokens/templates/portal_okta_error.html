{% extends "base.html" %}

{% block title %}Okta Login Error{% endblock %}

{% block content %}
<div class="container" style="max-width: 480px; margin: 80px auto;">
  <div class="card">
    <div class="card-header">
      <h2>Okta Login Error</h2>
    </div>
    <div class="card-body">
      <div class="alert alert-danger" role="alert">
        {{ error }}
      </div>
      <p class="text-muted">
        If this problem persists, please contact your administrator.
      </p>
      <a href="/portal/login" class="btn btn-primary">Try again</a>
    </div>
  </div>
</div>
{% endblock %}
