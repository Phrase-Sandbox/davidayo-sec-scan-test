{% extends "base.html" %}

{% block title %}Set New Password{% endblock %}

{% block content %}
<div class="container" style="max-width: 480px; margin: 80px auto;">
  <div class="card">
    <div class="card-header">
      <h2>Set New Password</h2>
    </div>
    <div class="card-body">
      <p class="text-muted mb-4">
        An administrator has requested a password change for your account.
        Please set a new password to continue.
      </p>

      {% if error %}
      <div class="alert alert-danger" role="alert">
        {{ error }}
      </div>
      {% endif %}

      <form method="post" action="/portal/change-password">
        <div class="mb-3">
          <label for="new_password" class="form-label">New password</label>
          <input
            type="password"
            class="form-control"
            id="new_password"
            name="new_password"
            minlength="12"
            required
            autofocus
          >
          <div class="form-text">Minimum 12 characters.</div>
        </div>
        <div class="mb-4">
          <label for="confirm_password" class="form-label">Confirm new password</label>
          <input
            type="password"
            class="form-control"
            id="confirm_password"
            name="confirm_password"
            minlength="12"
            required
          >
        </div>
        <button type="submit" class="btn btn-primary w-100">Set password</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
