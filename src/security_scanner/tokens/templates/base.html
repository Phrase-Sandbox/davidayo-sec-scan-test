<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="referrer" content="no-referrer">
  <title>{% block title %}Phrase Security Scanner{% endblock %}</title>
  <style>
    :root {
      color-scheme: light dark;
      --fg: #1a1a1a;
      --bg: #f7f7f8;
      --card: #ffffff;
      --muted: #6b7280;
      --accent: #2563eb;
      --danger: #b91c1c;
      --ok: #047857;
      --border: #e5e7eb;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --fg: #f3f4f6;
        --bg: #0b0e14;
        --card: #1f242d;
        --muted: #9ca3af;
        --border: #2c333d;
      }
    }
    * { box-sizing: border-box; }
    body {
      font: 15px/1.55 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: var(--fg);
      background: var(--bg);
      margin: 0;
      padding: 2rem 1rem;
    }
    main {
      max-width: 720px;
      margin: 0 auto;
    }
    header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 1.5rem;
    }
    header h1 {
      font-size: 1.25rem;
      margin: 0;
    }
    header .who {
      color: var(--muted);
      font-size: 0.9rem;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1.25rem 1.5rem;
      margin-bottom: 1rem;
    }
    h2 {
      font-size: 1.05rem;
      margin: 0 0 0.75rem;
    }
    p { margin: 0.5rem 0; }
    .muted { color: var(--muted); font-size: 0.9rem; }
    .danger { color: var(--danger); }
    .ok { color: var(--ok); }
    .flash {
      background: rgba(37, 99, 235, 0.08);
      border-left: 3px solid var(--accent);
      padding: 0.75rem 1rem;
      margin-bottom: 1rem;
      border-radius: 4px;
    }
    button, .btn {
      font: inherit;
      cursor: pointer;
      padding: 0.5rem 1rem;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--fg);
      margin-right: 0.5rem;
    }
    .btn-primary { background: var(--accent); color: white; border-color: var(--accent); }
    .btn-danger { background: var(--danger); color: white; border-color: var(--danger); }
    .token-box {
      font: 14px/1.4 ui-monospace, "SF Mono", Menlo, monospace;
      word-break: break-all;
      padding: 0.75rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      user-select: all;
    }
    dl { display: grid; grid-template-columns: max-content 1fr; gap: 0.4rem 1rem; margin: 0; }
    dt { color: var(--muted); }
    dd { margin: 0; font-variant-numeric: tabular-nums; }
    form { display: inline; }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>Phrase Security Scanner — Portal</h1>
      <span class="who">{{ user.email }}</span>
    </header>
    {% if flash %}<div class="flash">{{ flash }}</div>{% endif %}
    {% block content %}{% endblock %}
  </main>
</body>
</html>
