<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="referrer" content="no-referrer">
  <title>{% block title %}Phrase Security Scanner{% endblock %}</title>
  <style>
    :root {
      color-scheme: light dark;
      --fg: #1a1a1a;
      --bg: #f7f7f8;
      --card: #ffffff;
      --muted: #6b7280;
      --accent: #2563eb;
      --danger: #b91c1c;
      --ok: #047857;
      --border: #e5e7eb;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --fg: #f3f4f6;
        --bg: #0b0e14;
        --card: #1f242d;
        --muted: #9ca3af;
        --border: #2c333d;
      }
    }
    * { box-sizing: border-box; }
    body {
      font: 15px/1.55 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: var(--fg);
      background: var(--bg);
      margin: 0;
      padding: 2rem 1rem;
    }
    main {
      max-width: 720px;
      margin: 0 auto;
    }
    header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 1.5rem;
    }
    header h1 {
      font-size: 1.25rem;
      margin: 0;
    }
    header .who {
      color: var(--muted);
      font-size: 0.9rem;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1.25rem 1.5rem;
      margin-bottom: 1rem;
    }
    h2 {
      font-size: 1.05rem;
      margin: 0 0 0.75rem;
    }
    p { margin: 0.5rem 0; }
    .muted { color: var(--muted); font-size: 0.9rem; }
    .danger { color: var(--danger); }
    .ok { color: var(--ok); }
    .flash {
      background: rgba(37, 99, 235, 0.08);
      border-left: 3px solid var(--accent);
      padding: 0.75rem 1rem;
      margin-bottom: 1rem;
      border-radius: 4px;
    }
    button, .btn {
      font: inherit;
      cursor: pointer;
      padding: 0.5rem 1rem;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--fg);
      margin-right: 0.5rem;
    }
    .btn-primary { background: var(--accent); color: white; border-color: var(--accent); }
    .btn-danger { background: var(--danger); color: white; border-color: var(--danger); }
    .token-box {
      font: 14px/1.4 ui-monospace, "SF Mono", Menlo, monospace;
      word-break: break-all;
      padding: 0.75rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      user-select: all;
    }
    dl { display: grid; grid-template-columns: max-content 1fr; gap: 0.4rem 1rem; margin: 0; }
    dt { color: var(--muted); }
    dd { margin: 0; font-variant-numeric: tabular-nums; }
    form { display: inline; }
    /* Tab navigation */
    .tabs {
      display: flex;
      gap: 0;
      border-bottom: 1px solid var(--border);
      margin-bottom: 1.5rem;
    }
    .tabs a {
      display: block;
      padding: 0.55rem 1.1rem;
      text-decoration: none;
      color: var(--muted);
      font-size: 0.92rem;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      transition: color 0.1s;
    }
    .tabs a:hover { color: var(--fg); }
    .tabs a.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
      font-weight: 600;
    }
    /* Severity badges */
    .sev { display: inline-block; padding: 0.1rem 0.45rem; border-radius: 4px; font-size: 0.8rem; font-weight: 600; }
    .sev-C { background: #fde8e8; color: #7f1d1d; }
    .sev-H { background: #fef3c7; color: #78350f; }
    .sev-M { background: #fef9c3; color: #713f12; }
    .sev-L { background: #e0f2fe; color: #0c4a6e; }
    /* Table */
    table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
    th, td { text-align: left; padding: 0.5rem 0.75rem; border-bottom: 1px solid var(--border); }
    th { color: var(--muted); font-weight: 600; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.04em; }
    tr:hover td { background: rgba(0,0,0,0.02); }
    a { color: var(--accent); }
    /* Status pills */
    .pill { display: inline-block; padding: 0.1rem 0.5rem; border-radius: 99px; font-size: 0.8rem; }
    .pill-ok { background: #d1fae5; color: #065f46; }
    .pill-fail { background: #fee2e2; color: #7f1d1d; }
    /* Monospace IDs */
    .mono { font: 13px/1.4 ui-monospace, "SF Mono", Menlo, monospace; word-break: break-all; }
    /* Flash variants */
    .flash-ok  { background: rgba(4,120,87,0.08); border-left-color: var(--ok); }
    .flash-err { background: rgba(185,28,28,0.08); border-left-color: var(--danger); }
    /* Big stat cards */
    .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 0.75rem; margin-bottom: 1rem; }
    .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 1rem; text-align: center; }
    .stat-card .stat-num { font-size: 1.8rem; font-weight: 700; }
    .stat-card .stat-label { font-size: 0.8rem; color: var(--muted); margin-top: 0.2rem; }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>Phrase Security Scanner — Portal</h1>
      <span class="who">{{ user.email }}</span>
    </header>
    {% block tabs %}{% endblock %}
    {% if flash %}
    {% if flash.startswith("ok:") %}
      <div class="flash flash-ok">{{ flash[3:] }}</div>
    {% elif flash.startswith("error:") %}
      <div class="flash flash-err">{{ flash[6:] }}</div>
    {% else %}
      <div class="flash">{{ flash }}</div>
    {% endif %}
    {% endif %}
    {% block content %}{% endblock %}
  </main>
</body>
</html>
